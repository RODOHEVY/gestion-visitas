<script>
  // 1. Tu URL real de Google Sheets (Ya conectada)
  const DATABASE_API_URL = "https://script.google.com/macros/s/AKfycbwqXoNQbJbGu7UDOoNVcqnDV4zEJhOts4-Zi9OTPwxRIu0RDB1F9seM4S3vFsiY1ASR/exec";

  // 2. Esta función se ejecuta cuando presionas el botón de guardar
  function guardarRegistroEnGoogleSheets(event) {
      if (event) event.preventDefault(); // Evita que la página se recargue sola

      // RECOLECCIÓN DE DATOS: Sacamos lo que escribiste en la pantalla
      // IMPORTANTE: Los nombres como 'nombreTienda' deben ser los ID exactos de tus inputs en el HTML
      const datosDelFormulario = {
          tienda: document.getElementById('nombreTienda')?.value || 'No especificado',
          fecha: document.getElementById('fechaVisita')?.value || '',
          hora: document.getElementById('horaVisita')?.value || '',
          nombre_firmante: document.getElementById('nombreFirmante')?.value || 'Sin firma',
          estado_global: document.getElementById('estadoGlobal')?.innerText || 'ÓPTIMO',
          
          // Novedades de cada sección
          wifi_novedades_cobertura: document.getElementById('novedadesWifi')?.value || 'Sin novedades',
          rack_novedades_observaciones: document.getElementById('novedadesRack')?.value || 'Sin novedades',
          pos_novedades_cajeros: document.getElementById('novedadesCajas')?.value || 'Sin novedades',
          movil_novedades_hardware: document.getElementById('novedadesEquipos')?.value || 'Sin novedades',
          encargado_solicitudes_novedades: document.getElementById('notasEncargado')?.value || 'Sin notas'
      };

      // Avisamos en pantalla que estamos trabajando
      console.log("Enviando datos...", datosDelFormulario);

      // ENVIAR A GOOGLE SHEETS (Con el truco anti-bloqueos)
      fetch(DATABASE_API_URL, {
          method: 'POST',
          mode: 'no-cors', // <-- ESTO EVITA EL ERROR DE CONEXIÓN DE LA IMAGEN
          cache: 'no-cache',
          headers: {
              'Content-Type': 'application/json'
          },
          body: JSON.stringify(datosDelFormulario)
      })
      .then(() => {
          // Como usamos 'no-cors', si el paquete sale de la computadora, asumimos éxito total
          alert("¡Registro enviado con éxito a Google Sheets! 🚀");
          
          // Opcional: si quieres que el formulario se borre para una nueva visita, descomenta la línea de abajo:
          // document.getElementById('tuFormularioId')?.reset();
      })
      .catch(error => {
          console.error("Error real:", error);
          alert("Hubo un problema real de internet. Verifica tu red.");
      });
  }

  // 3. Decirle al botón de guardar de tu HTML que active esta función
  document.addEventListener("DOMContentLoaded", function() {
      // Busca el botón por su ID (si tu botón tiene id="btnGuardar")
      // Si no tiene ID, buscará el botón de tipo "submit" del formulario
      const botonGuardar = document.getElementById('btnGuardar') || document.querySelector('button[type="submit"]') || document.querySelector('.btn-success');
      
      if (botonGuardar) {
          botonGuardar.addEventListener('click', guardarRegistroEnGoogleSheets);
          console.log("Botón de guardado vinculado correctamente.");
      } else {
          console.log("No encontré el botón de guardar. Revisa su ID en el HTML.");
      }
  });
</script>
